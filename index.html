<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">📋</span>
                <h1>TaskFlow</h1>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-view="all">
                    <span class="nav-icon">📁</span> งานทั้งหมด
                    <span class="badge" id="badge-all">0</span>
                </button>
                <button class="nav-btn" data-view="today">
                    <span class="nav-icon">📅</span> วันนี้
                    <span class="badge" id="badge-today">0</span>
                </button>
                <button class="nav-btn" data-view="overdue">
                    <span class="nav-icon">🔴</span> เลยกำหนด
                    <span class="badge badge-danger" id="badge-overdue">0</span>
                </button>
                <button class="nav-btn" data-view="completed">
                    <span class="nav-icon">✅</span> เสร็จแล้ว
                    <span class="badge badge-success" id="badge-completed">0</span>
                </button>
                <button class="nav-btn" data-view="notes">
                    <span class="nav-icon">📝</span> Micro Notes
                    <span class="badge badge-note" id="badge-notes">0</span>
                </button>
            </nav>

            <!-- Tag Filter -->
            <div class="tag-filter-section">
                <h3>🏷️ แท็ก</h3>
                <div id="tag-filter-list" class="tag-filter-list"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="hamburger" id="hamburger-btn">☰</button>
                    <h2 id="view-title">งานทั้งหมด</h2>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="🔍 ค้นหา task...">
                    </div>
                    <select id="sort-select" class="sort-select">
                        <option value="created">เรียงตามวันสร้าง</option>
                        <option value="deadline">เรียงตาม Deadline</option>
                        <option value="name">เรียงตามชื่อ</option>
                    </select>
                </div>
            </header>

            <!-- Task View -->
            <section id="task-view" class="content-view active">
                <!-- Add Task Form -->
                <div class="add-task-card">
                    <h3>➕ เพิ่ม Task ใหม่</h3>
                    <form id="task-form">
                        <div class="form-row">
                            <input type="text" id="task-title" placeholder="ชื่อ Task..." required>
                            <input type="date" id="task-deadline">
                        </div>
                        <div class="form-row">
                            <input type="text" id="task-tags" placeholder="แท็ก (คั่นด้วยคอมม่า เช่น งาน, สำคัญ)">
                            <select id="task-priority">
                                <option value="low">🟢 ต่ำ</option>
                                <option value="medium" selected>🟡 ปานกลาง</option>
                                <option value="high">🔴 สูง</option>
                            </select>
                        </div>
                        <textarea id="task-description" placeholder="รายละเอียดเพิ่มเติม (ไม่บังคับ)..." rows="2"></textarea>
                        <button type="submit" class="btn btn-primary">เพิ่ม Task</button>
                    </form>
                </div>

                <!-- Task List -->
                <div id="task-list" class="task-list"></div>
                <div id="empty-state" class="empty-state" style="display:none;">
                    <span class="empty-icon">🎉</span>
                    <p>ไม่มี Task ในหมวดนี้</p>
                </div>
            </section>

            <!-- Notes View -->
            <section id="notes-view" class="content-view">
                <div class="add-note-card">
                    <h3>📝 เพิ่ม Micro Note</h3>
                    <form id="note-form">
                        <textarea id="note-content" placeholder="จดเตือนความจำ..." rows="3" required></textarea>
                        <div class="form-row">
                            <input type="text" id="note-color-picker" class="hidden">
                            <div class="color-picker">
                                <button type="button" class="color-dot active" data-color="#FFF9C4" style="background:#FFF9C4"></button>
                                <button type="button" class="color-dot" data-color="#C8E6C9" style="background:#C8E6C9"></button>
                                <button type="button" class="color-dot" data-color="#BBDEFB" style="background:#BBDEFB"></button>
                                <button type="button" class="color-dot" data-color="#F8BBD0" style="background:#F8BBD0"></button>
                                <button type="button" class="color-dot" data-color="#E1BEE7" style="background:#E1BEE7"></button>
                                <button type="button" class="color-dot" data-color="#FFE0B2" style="background:#FFE0B2"></button>
                            </div>
                            <button type="submit" class="btn btn-note">เพิ่ม Note</button>
                        </div>
                    </form>
                </div>
                <div id="notes-grid" class="notes-grid"></div>
                <div id="notes-empty" class="empty-state" style="display:none;">
                    <span class="empty-icon">📝</span>
                    <p>ยังไม่มี Note</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Task Detail Modal -->
    <div id="task-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>แก้ไข Task</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="edit-task-form" class="modal-body">
                <input type="hidden" id="edit-task-id">
                <label>ชื่อ Task</label>
                <input type="text" id="edit-task-title" required>
                <label>รายละเอียด</label>
                <textarea id="edit-task-description" rows="3"></textarea>
                <label>Deadline</label>
                <input type="date" id="edit-task-deadline">
                <label>แท็ก</label>
                <input type="text" id="edit-task-tags">
                <label>Priority</label>
                <select id="edit-task-priority">
                    <option value="low">🟢 ต่ำ</option>
                    <option value="medium">🟡 ปานกลาง</option>
                    <option value="high">🔴 สูง</option>
                </select>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">บันทึก</button>
                    <button type="button" class="btn btn-danger" id="delete-task-btn">ลบ Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/storage.js"></script>
    <script src="js/taskManager.js"></script>
    <script src="js/noteManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
